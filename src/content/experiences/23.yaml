        value: "seed-fu, cancancan, rolify, ransack, cocoon, paper_trail, draper, active_model_serializers, aws-sdk, kintone, enumerize, exception_notification, rspec, webpacker, slim-rails"
      - key: "npm"
        value: "cocoon, popper.js, PostCSS, Prettier, ESlint, Stylelint, webpacker, axios, autosize, jquery, floating-vue, tiny-slider, typescript, vue, vee-validate"
      - key: "Other"
        value: "Webpack, esbuild"
  - title: "やったこと"
    items:
      - key: "機能開発"
        value: "非エンジニアによる画面構成図をもとに詳細設計、DB設計から新規開発、改修、テスト作成までおこなう。"
      - key: "デザインをもとにサイト全体のHTMLコーディング"
        value: "命名はBEMを採用。コンポーネントごと指向にて管理しやすい構成とした。"
      - key: "パフォーマンス・チューニング"
        value:
          - "実行計画を測定し適切なindexを貼ったりクエリをチューニングし対応。"
          - "重い処理によるメモリリーク改善"
      - key: "E2Eテスト導入"
        value: "E2Eテストがなかったため導入。なるべく処理を適度なレイヤーで分け、責務ごとに疎結合にして処理ごとにユニットテストをかき、E2Eテストのボリュームを最低限にして導入。"
      - key: "Github Actions整備"
        value: "Circle CIからGithub Actionsへの移行"
      - key: "Vueリファクタリング"
        value: "巨大SFCをComposition APIで責務ごとに処理を分割し、見通しよくした。"
      - key: "Railsアップデート6->7"
        value: "他のGemも更新しないといけなく、Gem更新によるデグレを防ぐためのテストを書いて対応した。"
      - key: "フロントエンド環境整備"
        value:
          - "gemでjsを使用できるようにしていたが、esbuildやpropshaft、jsbundling-railsなどを導入し、nodeパッケージを使用するようにした。"
          - "browserslistを参考にベンダープレフィックス付与やトランスパイルなどを行うようにも設定。"
      - key: "Linter導入"
        value:
          - "フロントのrepoにlinterがなかったためESlintやPrettierなど導入。"
          - "システム完了後に導入したためデグレ防止など大変だった。"
      - key: "保守業務"
        value:
          - "sentryアラートで検出したバグ修正や、SQLチューニングなどのパフォーマンス改善、改修依頼の要望に応じて対応。"
          - "Docker環境の設計、構築"
          - "GitHub ActionsでのCI/CD構築、修正"
          - "コードレビュー及び品質チェック"

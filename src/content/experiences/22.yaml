  - title: "やったこと"
    items:
      - key: "機能開発"
        value: "画面構成図をもとに詳細設計、DB設計から新規開発、改修、バグ修正、テスト作成までおこなう。"
      - key: "Rubyアップデート"
        value:
          - "2.5から段階を経て3.1までアップデートを行った。"
          - "ユニットテストやE2Eテストの作成、各種ライブラリのアップデート、一部ライブラリの更新で動かなくなるコア機能があったため部分的にモンキーパッチを適用するなどした。"
      - key: "Railsアップデート"
        value:
          - "5系->6系->7系へとアップデートを実施。"
          - "リグレッションテストの追加など対応。"
      - key: "CIセットアップ"
        value: "CircleCI から Github Actions への移行対応。"
      - key: "MySQLアップデート"
        value: "5.7から8へアップデート。deprecatedとなった機能を使っていた箇所の修正対応など影響範囲を調査し対応。"
      - key: "テスト高速化"
        value: "CIでのテストの実行時間が長かったため、並列化や不要なレコード作成をなくすことで対応。"
      - key: "jQueryアップデート"
        value: "1.12から3.6にアップデート。改修範囲が広かったためjQuery Migrateを使用し、段階的にmigrateを行った。"
      - key: "フロントエンド環境整備"
        value:
          - "gemでjsを使用できるようにしていたが、esbuildやpropshaft、jsbundling-railsなどを導入し、nodeパッケージを使用するようにした。"
          - "browserslistを参考にベンダープレフィックス付与やトランスパイルなどを行うようにも設定。"
          - "フロントエンドのrepoにlinterがなかったためESlintやPrettier、Stylelintなど導入。"
      - key: "WebP変換対応"
        value:
          - "既存のpng画像をWebPに変換する対応を行った。今後アップロードされる画像もWebPに自動変換されるようにした。"
          - "WebPに対応していないブラウザもサポートする必要があったため、フォールバックも対応。"
      - key: "保守業務"
        value:
          - "sentryアラートで検出したバグ修正や、SQLチューニングなどのパフォーマンス改善、改修依頼の要望に応じて対応。"
          - "Docker環境の設計、構築"
          - "GitHub ActionsでのCI/CD構築、修正"
          - "コードレビュー及び品質チェック"

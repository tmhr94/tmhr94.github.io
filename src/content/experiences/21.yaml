        value: "acts_as_favoritor, acts_as_votable, counter_culture, seed-fu, enumerize, slim-rails, rambulance, kakasi, geocoder, shoryuken, paper_trail, administrate, banken, aws-sdk-s3, active_decorator, rspec"
      - key: "npm"
        value: "tiny-slider, vue, nuxt, autoprefixer, ESlint, jest, PostCSS, sass, typescript"

  - title: "やったこと"
    items:
      - key: "機能開発"
        value: "issueをもとにDB設計から新規開発、改修、テストまでおこなう。"
      - key: "CWV改善"
        value: "web.devをもとに改善。VueでCSRだったため、placeholderを用意したりなど工夫が必要だった。"
      - key: "Github Actions整備"
        value: "Circle CIからGithub Actionsへの移行"
      - key: "Cloud Front導入"
        value: "S3を直接見ていたファイルをCF経由でアクセスする。\n\nlocalstackで一部機能提供していないものがあったためissueで質問などしていた。"
      - key: "IE11をbrowserslistから除外"
        value: "core-jsやPolyfill(intersection-observerなど)が複数入っていたため影響範囲調査して対応。"
      - key: "リバプロ廃止"
        value: "Nginxのconfで設定"
      - key: "Rubyバージョンアップデート"
        value: "Rubyのバージョンアップデートに伴い、Dockerfileの更新や影響範囲の調査など対応。"
      - key: "旧サイト閉鎖"
        value: "旧サイトにユーザーがアクセス出来ていたため、閲覧以外の機能を使えなくするよう調査し対応。"

        value: "元々、ケアマネジャー用SNSはあったが、アーキテクチャや使用言語など全てを一新するプロジェクト。PdMのもと、ざっくりした要望がかかれたissueから設計をし実装をしていた。\n\nこちらの企業様では、元々別の新規プロダクト開発でお世話になっていたが、少し手が空くタイミングがあったため、こちらのプロダクトも携わらせて頂いた。"
